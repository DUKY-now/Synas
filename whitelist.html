<section class="hero">
<h1>Whitelist</h1>
<p>Rejoignez le serveur</p>


<form id="whitelistForm">

<input type="text" name="nom" placeholder="Nom RP" required>

<input type="number" name="age" placeholder="Age" required>

<textarea name="histoire" placeholder="Histoire RP"></textarea>

<button type="submit">Envoyer</button>

</form>
<script>

document.getElementById("whitelistForm").addEventListener("submit", async function(e){

e.preventDefault();

const formData = new FormData(this);

const data = {
nom: formData.get("nom"),
age: formData.get("age"),
histoire: formData.get("histoire")
};

await fetch("https://https://script.google.com/macros/library/d/11QJ_PtlKzHRVYKMC50i-CKuuzYsRHS3EAJPMCYaEHix0Q1rBXXReNPu3/2", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify(data)
});

alert("Envoyé !");

});

</script>
